<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBG13™ | Management Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #fbfbfd;
            --sidebar: #ffffff;
            --accent: #007aff;
            --text-main: #1d1d1f;
            --text-dim: #86868b;
            --border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 999; background: #fff;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            width: 380px; padding: 40px; text-align: center;
        }
        .login-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }
        input {
            width: 100%; padding: 14px; margin: 8px 0; background: #f5f5f7;
            border: 1px solid transparent; border-radius: 12px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: #fff; }
        .btn-primary {
            width: 100%; padding: 14px; background: var(--accent); color: #fff;
            border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px; margin-top: 15px;
        }

        /* --- DASHBOARD LAYOUT --- */
        #admin-panel { display: none; width: 100%; grid-template-columns: 260px 1fr; }
        
        aside {
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }
        .logo { font-size: 20px; font-weight: 700; margin-bottom: 40px; padding-left: 10px; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--text-dim); font-size: 14px; font-weight: 500; transition: 0.2s; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: #f5f5f7; color: var(--accent); }

        /* ACTIVE MEMBERS */
        .members-section { margin-top: auto; padding: 20px 10px; border-top: 1px solid var(--border); }
        .member { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 13px; font-weight: 500; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; }

        /* MAIN CONTENT */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .profile { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; color: var(--text-dim); }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card {
            background: #fff; padding: 25px; border-radius: 20px;
            border: 1px solid var(--border); box-shadow: var(--card-shadow);
        }
        .card h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .card .value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }

        .content-split { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .section-box { background: #fff; border-radius: 24px; border: 1px solid var(--border); padding: 30px; box-shadow: var(--card-shadow); }

        /* CHAT SYSTEM */
        #chat-window { height: 350px; overflow-y: auto; margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.me { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.other { background: #f2f2f7; color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg small { display: block; font-size: 10px; opacity: 0.7; margin-bottom: 4px; }

        .chat-footer { display: flex; gap: 10px; }
        .chat-footer input { margin: 0; }
        .btn-send { background: var(--accent); color: #fff; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>YBG13™</h1>
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
            <button class="btn-primary" id="loginBtn">Giriş Yap</button>
            <p id="login-error" style="color: #ff3b30; font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="admin-panel">
        <aside>
            <div class="logo">YBG13™</div>
            <div class="nav-item active">Panel Özeti</div>
            <div class="nav-item">Proje Yönetimi</div>
            <div class="nav-item">Aegis Güvenlik</div>
            <div class="nav-item">Ayarlar</div>

            <div class="members-section">
                <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 15px; font-weight: 700;">AKTİF ÜYELER</p>
                <div id="active-list"></div>
                <button id="logoutBtn" style="margin-top: 20px; background: none; border: none; color: #ff3b30; font-size: 12px; cursor: pointer; font-weight: 600;">Oturumu Kapat</button>
            </div>
        </aside>

        <main>
            <header>
                <h2 id="header-title">Yönetim Paneli</h2>
                <div class="profile">
                    <span id="user-name-display">Kullanıcı</span>
                    <div style="width: 32px; height: 32px; background: #eee; border-radius: 50%;"></div>
                </div>
            </header>

            <div class="grid">
                <div class="card">
                    <h3>Sistem Gecikmesi</h3>
                    <div class="value" id="ping-stat" style="color: #34c759;">-- ms</div>
                </div>
                <div class="card">
                    <h3>Kullanılabilir RAM</h3>
                    <div class="value" id="ram-stat">-- GB</div>
                </div>
                <div class="card">
                    <h3>Aegis Durumu</h3>
                    <div class="value" style="color: var(--accent);">Aktif</div>
                </div>
            </div>

            <div class="content-split">
                <div class="section-box">
                    <h3 style="font-size: 16px; margin-bottom: 20px;">Trafik Analizi</h3>
                    <canvas id="trafficChart"></canvas>
                </div>
                <div class="section-box" style="display: flex; flex-direction: column;">
                    <h3 style="font-size: 16px;">Güvenli Yazışma</h3>
                    <p style="font-size: 11px; color: #ff3b30; margin-top: 5px;">Mesajlar 24 saat sonra otomatik silinir.</p>
                    <div id="chat-window"></div>
                    <div class="chat-footer">
                        <input type="text" id="chatInput" placeholder="Mesaj yazın...">
                        <button id="sendBtn" class="btn-send">Gönder</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, getDocs, deleteDoc, where, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0Mv6ovlgvilx8x4W7dPR1UZYLpKduqeI",
            authDomain: "ybg13-a6ab3.firebaseapp.com",
            projectId: "ybg13-a6ab3",
            storageBucket: "ybg13-a6ab3.firebasestorage.app",
            messagingSenderId: "623025176609",
            appId: "1:623025176609:web:febf58e3150992dd142360",
            measurementId: "G-D5CFJP1MZ0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const chatColl = collection(db, "secure_messages");
        const presenceColl = collection(db, "active_users");

        // --- AUTH ---
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('login-error').innerText = "Giriş başarısız.";
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const name = user.email.split('@')[0].toUpperCase();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'grid';
                document.getElementById('user-name-display').innerText = name;
                document.getElementById('header-title').innerText = `Hoş Geldin, ${name}`;

                // Presence
                await setDoc(doc(presenceColl, user.uid), { name: name, lastSeen: serverTimestamp() });

                startSystemMetrics();
                loadChat();
                loadPresence();
                autoCleanChat();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        document.getElementById('logoutBtn').onclick = async () => {
            await deleteDoc(doc(presenceColl, auth.currentUser.uid));
            signOut(auth);
        };

        // --- REAL DATA ---
        function startSystemMetrics() {
            if(navigator.deviceMemory) document.getElementById('ram-stat').innerText = navigator.deviceMemory + " GB";
            
            setInterval(async () => {
                const start = Date.now();
                try {
                    await fetch('https://www.google.com/favicon.ico', { mode: 'no-cors' });
                    document.getElementById('ping-stat').innerText = (Date.now() - start) + " ms";
                } catch { document.getElementById('ping-stat').innerText = "Err"; }
            }, 5000);
        }

        // --- CHAT & PRESENCE ---
        const sendBtn = document.getElementById('sendBtn');
        const chatInput = document.getElementById('chatInput');
        const chatWindow = document.getElementById('chat-window');

        sendBtn.onclick = async () => {
            if(!chatInput.value) return;
            const msg = chatInput.value;
            chatInput.value = "";
            await addDoc(chatColl, {
                uid: auth.currentUser.uid,
                sender: auth.currentUser.email.split('@')[0].toUpperCase(),
                text: msg,
                time: serverTimestamp()
            });
        };

        function loadChat() {
            const q = query(chatColl, orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                chatWindow.innerHTML = "";
                const limit = Date.now() - (24 * 60 * 60 * 1000);
                snap.forEach(d => {
                    const data = d.data();
                    if(!data.time) return;
                    if(data.time.toDate().getTime() > limit) {
                        const div = document.createElement('div');
                        div.className = `msg ${data.uid === auth.currentUser.uid ? 'me' : 'other'}`;
                        div.innerHTML = `<small>${data.sender}</small>${data.text}`;
                        chatWindow.appendChild(div);
                    }
                });
                chatWindow.scrollTop = chatWindow.scrollHeight;
            });
        }

        function loadPresence() {
            onSnapshot(presenceColl, (snap) => {
                const list = document.getElementById('active-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const user = d.data();
                    list.innerHTML += `<div class="member"><div class="dot"></div>${user.name}</div>`;
                });
            });
        }

        async function autoCleanChat() {
            const limit = new Date(Date.now() - (24 * 60 * 60 * 1000));
            const q = query(chatColl, where("time", "<", limit));
            const oldOnes = await getDocs(q);
            oldOnes.forEach(d => deleteDoc(d.ref));
        }

        // --- CHART ---
        const ctx = document.getElementById('trafficChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'],
                datasets: [{
                    label: 'Ziyaretçi',
                    data: [120, 190, 150, 250, 210, 310, 280],
                    borderColor: '#007aff',
                    backgroundColor: 'rgba(0,122,255,0.05)',
                    fill: true, tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });
    </script>
</body>
</html>
