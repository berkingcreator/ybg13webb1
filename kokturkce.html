<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Köktürkçe Çeviri - YBG13™</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF; /* Apple Blue */
            --bg: #F5F5F7;
            --surface: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 255, 255, 0.5);
            --text-dark: #1D1D1F;
            --text-muted: #86868B;
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Sayfayı Flexbox yaparak Footer'ı en alta itiyoruz */
        body {
            background-color: var(--bg);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -20%;
            left: -10%;
            width: 50%;
            height: 60%;
            background: radial-gradient(circle, rgba(0,122,255,0.05) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 60px 20px;
            margin: 0 auto;
            flex: 1; /* İçeriği yayarak footer'ı aşağı iter */
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDown 0.8s ease;
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -3px;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #1d1d1f 0%, #434343 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.08);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .badge {
            background: rgba(0,122,255,0.1);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.4rem;
            color: var(--text-dark);
            line-height: 1.5;
            resize: none;
        }

        #gkOutput {
            font-size: 2.2rem;
            color: var(--text-dark);
            direction: rtl;
            text-align: right;
            word-wrap: break-word;
            min-height: 120px;
            transition: var(--transition);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            background: var(--text-dark);
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover { background: #434343; transform: scale(1.02); }

        /* Geliştirilmiş Modern Footer */
        .site-footer {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding: 40px 0;
            width: 100%;
            margin-top: auto;
        }

        .footer-inner {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            padding: 0 20px;
        }

        .footer-inner p {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .footer-inner a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .footer-inner a:hover { color: var(--primary); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 850px) {
            .bento-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Köktürkçe Çeviri</h1>
        <p>Geleceği yazmak için köklere dönüş.</p>
    </header>

    <div class="bento-grid">
        <div class="glass-card">
            <div class="label-row">
                <span class="badge">Modern Türkçe</span>
                <span style="font-size: 0.8rem; color: #AEAEB2;" id="charCount">0 Karakter</span>
            </div>
            <textarea id="trInput" placeholder="Türkçe bir metin girin..."></textarea>
        </div>

        <div class="glass-card">
            <div class="label-row">
                <span class="badge" style="background: rgba(0,0,0,0.05); color: #000;">Köktürk Damga</span>
            </div>
            <div id="gkOutput"></div>
            <button class="btn" id="copyBtn" onclick="copyText()">Metni Kopyala</button>
        </div>
    </div>
</div>

<footer class="site-footer">
    <div class="footer-inner">
        <p>© 2026 <a href="https://ybg13.com">YBG13™</a> — Yerli Yazılım ve Teknoloji. Tüm Hakları Saklıdır.</p>
    </div>
</footer>

<script>
    const thickConsonants = { 'b':'𐰉', 'd':'𐰑', 'g':'𐰍', 'k':'𐰴', 'l':'𐰞', 'n':'𐰣', 'r':'𐰺', 's':'𐰽', 't':'𐱃', 'y':'𐰖' };
    const thinConsonants = { 'b':'𐰋', 'd':'𐰓', 'g':'𐰏', 'k':'𐰚', 'l':'𐰜', 'n':'𐰤', 'r':'𐰼', 's':'𐰾', 't':'𐱅', 'y':'𐰘' };
    const neutralConsonants = { 
        'ç':'𐰲', 'm':'𐰢', 'p':'𐰯', 'ş':'𐱁', 'z':'𐰔', 'v':'𐰋', 'h':'𐰴',
        'f':'𐰯', 
        'j':'𐰲' 
    };
    const vowels = { 'a':'𐰀', 'e':'𐰀', 'ı':'𐰃', 'i':'𐰃', 'o':'𐰆', 'u':'𐰆', 'ö':'𐰇', 'ü':'𐰇' };

    const trInput = document.getElementById('trInput');
    const gkOutput = document.getElementById('gkOutput');
    const charCount = document.getElementById('charCount');

    function getHarmony(word) {
        const thick = "aıouAIOU";
        const thin = "eiöüEİÖÜ";
        for (let i = word.length - 1; i >= 0; i--) {
            if (thick.includes(word[i])) return 'thick';
            if (thin.includes(word[i])) return 'thin';
        }
        return 'thin';
    }

    function translate(text) {
        if(!text) return "";
        const words = text.split(/\s+/);
        let result = [];

        words.forEach(word => {
            let translatedWord = "";
            let harmony = getHarmony(word);
            let lower = word.toLowerCase();

            for (let char of lower) {
                if (vowels[char]) translatedWord += vowels[char];
                else if (neutralConsonants[char]) translatedWord += neutralConsonants[char];
                else if (harmony === 'thick' && thickConsonants[char]) translatedWord += thickConsonants[char];
                else if (harmony === 'thin' && thinConsonants[char]) translatedWord += thinConsonants[char];
                else translatedWord += char;
            }
            result.push(translatedWord);
        });

        return result.join(' ⁚ '); // Antik ayraç
    }

    trInput.addEventListener('input', (e) => {
        const val = e.target.value;
        gkOutput.innerText = translate(val);
        charCount.innerText = `${val.length} Karakter`;
    });

    function copyText() {
        const text = gkOutput.innerText;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Başarıyla Kopyalandı";
            btn.style.background = "#34C759";
            setTimeout(() => {
                btn.innerText = "Metni Kopyala";
                btn.style.background = "var(--text-dark)";
            }, 2000);
        });
    }
</script>
</body>
</html>
